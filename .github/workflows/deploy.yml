name: Deploy Spring Boot

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run deploy script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd havePlace
            
            git pull origin main
            
            (sudo pkill -f "spring-boot:run") || true
            
            sudo truncate -s 0 application.log
            
            sudo nohup sudo mvn spring-boot:run >> application.log 2>&1 &